<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="title">Tell Us About Yourself</h1>
    <p id="description">
      Thank you for taking the time to complete this survey!
    </p>
    <form id="survey-form">
      <div class="form-group">
        <label id="name-label" for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>

      <div class="form-group">
        <label id="email-label" for="email">Email:</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label id="number-label" for="number">Age (optional):</label>
        <input
          type="number"
          id="number"
          min="13"
          max="120"
          placeholder="Enter your age"
        />
      </div>

      <div class="form-group">
        <label for="dropdown"
          >Which option best describes your current role?</label
        >
        <select id="dropdown">
          <option value="" disabled selected>Select an option</option>
          <option value="student">Student</option>
          <option value="learner">Independent Learner</option>
          <option value="professional">Employed Professional</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <p>What do you enjoy most about learning?</p>
        <label>
          <input type="radio" name="most-like" value="challenges" /> Challenges
        </label>
        <label>
          <input type="radio" name="most-like" value="new-skills" /> Acquiring
          New Skills
        </label>
        <label>
          <input type="radio" name="most-like" value="problem-solving" />
          Problem Solving
        </label>
        <label>
          <input type="radio" name="most-like" value="community" /> Being Part
          of a Community
        </label>
      </div>

      <div class="form-group">
        <p>
          What areas are you interested in improving? (Check all that apply)
        </p>
        <label>
          <input type="checkbox" name="improve" value="frontend" /> Front-end
          Development
        </label>
        <label>
          <input type="checkbox" name="improve" value="backend" /> Back-end
          Development
        </label>
        <label>
          <input type="checkbox" name="improve" value="data-visualization" />
          Data Visualization
        </label>
        <label>
          <input type="checkbox" name="improve" value="machine-learning" />
          Machine Learning
        </label>
      </div>

      <div class="form-group">
        <label for="comments">Any additional comments or suggestions?</label>
        <textarea
          id="comments"
          placeholder="Enter your comments here..."
        ></textarea>
      </div>

      <div class="form-group">
        <button type="submit" id="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
